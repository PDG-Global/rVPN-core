version: '3.8'

services:
  rvpn-server:
    build: .
    image: rvpn-server:latest
    container_name: rvpn-server
    restart: unless-stopped
    
    # Network capabilities for VPN/NAT functionality
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    # Port mappings
    ports:
      - "443:443/tcp"      # Main VPN/WebSocket port
      - "8080:8080/tcp"    # HTTP redirect/decoy port
    
    # Volume mounts
    volumes:
      - ./config:/etc/rvpn:ro      # Server configuration
      - ./certs:/etc/rvpn/certs:ro # TLS certificates
      - ./data:/var/lib/rvpn       # Persistent data
    
    # Environment variables
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for session persistence (HA setup)
  redis:
    image: redis:7-alpine
    container_name: rvpn-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    profiles:
      - ha

volumes:
  redis-data:
